model:
  name: "./outputs/sft"         # start from SFT checkpoint, not base Mistral
  torch_dtype: "float16"
  load_in_4bit: true

training:
  dataset: "Anthropic/hh-rlhf"
  max_seq_length: 512
  num_epochs: 1                 # reward models overfit quickly, 1 epoch is enough
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 1e-5           # lower LR than SFT, reward model is sensitive
  warmup_ratio: 0.03
  output_dir: "./outputs/reward"
  logging_steps: 10
  save_steps: 100

wandb:
  project: "hr-llm-alignment"
  run_name: "reward-model-mistral-7b-hr"
  tags: ["reward-model", "bradley-terry", "hr"]