model:
  name: "mistralai/Mistral-7B-v0.1"
  torch_dtype: "float16"
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

training:
  dataset: "Anthropic/hh-rlhf"
  max_samples: 8000
  max_seq_length: 512
  num_epochs: 2
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  output_dir: "./outputs/sft"
  logging_steps: 10
  save_steps: 200

wandb:
  project: "hr-llm-alignment"
  run_name: "sft-mistral-7b-hr"
  tags: ["sft", "mistral-7b", "qlora", "hr"]