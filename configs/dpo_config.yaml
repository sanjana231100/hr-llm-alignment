model:
  name: "mistralai/Mistral-7B-v0.1"
  torch_dtype: "float16"
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"

training:
  max_samples: 2000
  max_seq_length: 512
  max_prompt_length: 256
  num_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5e-5
  beta: 0.1                    # KL penalty strength — higher = stay closer to SFT
  warmup_steps: 10
  output_dir: "./outputs/dpo"
  logging_steps: 10
  save_steps: 100

wandb:
  project: "hr-llm-alignment"
  run_name: "dpo-mistral-7b-hr"
  tags: ["dpo", "mistral-7b", "qlora", "hr"]